name: Daily ETF Prices Update

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝 yfinance 套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance

    - name: 執行 Python 爬蟲
      run: python update_etf.py

    - name: 檢查檔案狀態並提交回 GitHub
      run: |
        git config --global user.name "ETF-Bot"
        git config --global user.email "bot@github.com"
        git add etf_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新 ETF 最新收盤價" && git push)
