name: Daily ETF Prices Update

on:
  schedule:
    # 每個禮拜一到五，台灣時間下午 4:30 自動執行 (UTC 8:30)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 這行可以讓我們在網頁上點擊「手動執行」測試

permissions:
  contents: write # 賦予機器人寫入並更新倉庫檔案的權限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝 yfinance 套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance

    - name: 執行 Python 爬蟲
      run: python update_etf.py

    - name: 檢查檔案狀態並提交回 GitHub
      run: |
        git config --global user.name "ETF-Bot"
        git config --global user.email "bot@github.com"
        git add etf_data.json
        # 如果檔案有變動才提交，沒變動就跳過不報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新 ETF 最新收盤價" && git push)
